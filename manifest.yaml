# LATTICE manifest — declares the mesh topology.
# Loaded by RAVEN_MESH Core on the Mac mini.
# Edit this file to add nodes, surfaces, or edges; reload via core.reload_manifest.

nodes:
  - id: edith
    kind: capability
    runtime: docker
    identity_secret: env:EDITH_SECRET
    metadata:
      description: "Sonnet 4.6 agent. Daily-driver assistant. Runs on Mac mini."
      host: mac-mini
    surfaces:
      - name: chat
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/chat.json

  - id: control
    kind: actor
    runtime: web
    identity_secret: env:CONTROL_SECRET
    metadata:
      description: "Web dashboard. Colton's interactive control panel. Runs on Colton's Mac."
      host: coltons-mac
    surfaces: []

  - id: raven
    kind: actor
    runtime: native
    identity_secret: env:RAVEN_SECRET
    metadata:
      description: "RAVEN AI agent portal. Inbox lands in RAVEN's unified queue. Runs on Mac mini."
      host: mac-mini
    surfaces:
      - name: message
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json

relationships:
  # Inbound to RAVEN portal: only control can wake RAVEN for now.
  - from: control
    to: raven.message

  # Inbound to EDITH chat surface.
  - from: control
    to: edith.chat
  - from: raven
    to: edith.chat

  # Core surfaces.
  - from: control
    to: core.audit_query
  - from: raven
    to: core.audit_query
  - from: raven
    to: core.state
  - from: raven
    to: core.processes
  - from: raven
    to: core.metrics
  - from: raven
    to: core.set_manifest
  - from: raven
    to: core.reload_manifest
  - from: raven
    to: core.spawn
  - from: raven
    to: core.stop
  - from: raven
    to: core.restart
  - from: raven
    to: core.reconcile
  - from: raven
    to: core.drain

# LATTICE manifest — declares the mesh topology.
# Loaded by RAVEN_MESH Core on the Mac mini.
# Edit this file to add nodes, surfaces, or edges; reload via core.reload_manifest.

nodes:
  - id: edith
    kind: capability
    runtime: docker
    identity_secret: env:EDITH_SECRET
    metadata:
      description: "Sonnet 4.6 agent. Daily-driver assistant. Runs on Mac mini."
      host: mac-mini
    surfaces:
      - name: chat
        type: inbox
        invocation_mode: fire_and_forget
        schema: shared/schemas/chat.json

  - id: control
    kind: actor
    runtime: web
    identity_secret: env:CONTROL_SECRET
    metadata:
      description: "Web dashboard. Colton's interactive control panel. Runs on Colton's Mac."
      host: coltons-mac
    surfaces:
      - name: message
        type: inbox
        invocation_mode: fire_and_forget
        schema: shared/schemas/permissive.json

  - id: raven
    kind: actor
    runtime: native
    identity_secret: env:RAVEN_SECRET
    metadata:
      description: "RAVEN AI agent portal. Inbox lands in RAVEN's unified queue. Runs on Mac mini."
      host: mac-mini
    surfaces:
      - name: message
        type: inbox
        invocation_mode: fire_and_forget
        schema: shared/schemas/permissive.json

  - id: voice
    kind: interface
    runtime: native
    identity_secret: env:VOICE_SECRET
    metadata:
      description: "gpt-realtime-2 voice node. Mic + speakers on Colton's Mac. Manual start_session via inspector at http://localhost:8807."
      host: coltons-mac
    surfaces:
      # Tool surfaces (callable, request_response).
      - name: start_session
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: stop_session
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: session_status
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      # Operator hot-tuning of the voice node's system prompt.
      # get_system_message returns the fully resolved instructions string
      # (built dynamically from mesh tools + operator override). set replaces
      # the operator override and persists it to disk so it survives restart.
      - name: get_system_message
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: set_system_message
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      # Inbox surfaces (fire_and_forget). speak=verbatim, tell=conversational.
      - name: speak
        type: inbox
        invocation_mode: fire_and_forget
        schema: shared/schemas/permissive.json
      - name: tell
        type: inbox
        invocation_mode: fire_and_forget
        schema: shared/schemas/permissive.json

  - id: avp
    kind: actor
    runtime: docker
    identity_secret: env:AVP_SECRET
    metadata:
      description: "RAVEN_AVP scene proxy. Translates mesh envelopes into HTTPX calls to the FastAPI scene server (coltons-mac:5180). Runs on Mac mini."
      host: mac-mini
    surfaces:
      - name: show
        type: inbox
        invocation_mode: fire_and_forget
        schema: shared/schemas/permissive.json
      - name: add_panel
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
        purpose: |
          Add a 2D panel to the AVP scene. Supported kinds: markdown,
          mermaid, chart, model3d, image, html. Pass {kind, ...kind-specific
          fields} (e.g. markdown takes `text`, mermaid takes `text` with
          diagram source, chart takes `data`, image takes `url`). Returns
          the created panel. Panels are SEPARATE from entities — they have
          their own ID namespace and rendering pipeline.
      - name: update_panel
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: remove_panel
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: list_panels
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: clear_scene
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      # Entity surfaces — mirror panel CRUD against /scene/entity routes.
      # Entities are richer than panels (geometry, material, gestures,
      # parent_id, cluster_id, label, etc.); the scene server's pydantic
      # validation is canonical, this node is a thin pass-through.
      - name: add_entity
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
        purpose: |
          Add a 3D hologram entity (sphere, cube, line, wireframe, etc.)
          to the AVP scene. Pass {kind, position, ...kind-specific fields}.
          Returns the created entity. Entities are SEPARATE from panels —
          they have their own ID namespace and rendering pipeline.
      - name: update_entity
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
        purpose: |
          Modify an existing entity by id. Pass {id, patch:{...}} where
          patch merges into the entity. Use for moving holograms, changing
          colors, resizing wireframes, etc.
      - name: remove_entity
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
        purpose: |
          Remove an entity by id. Returns 404 if id is wrong. Use list_entities
          to verify before removing if uncertain.
      - name: list_entities
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
        purpose: |
          Query the current entity inventory. Returns array of compact entity
          summaries (id, kind, position, key geometry fields). Use when Colton
          asks what holograms are in the scene or before modifying/removing one.
      - name: screenshot
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
        purpose: |
          Capture a screenshot of the current AVP scene. Returns
          {path, size_bytes, format} — file persisted on the avp node's
          filesystem. Use to see what Colton is looking at.

  - id: browser
    kind: capability
    runtime: docker
    identity_secret: env:BROWSER_SECRET
    metadata:
      description: "Browser-automation agent. browser-use + Sonnet 4.6 driving Chromium in Docker. Natural-language task in, text answer out. Runs on Mac mini."
      host: mac-mini
    surfaces:
      - name: query
        type: inbox
        invocation_mode: fire_and_forget
        schema: shared/schemas/permissive.json

  - id: avp_voice
    kind: actor
    runtime: docker
    identity_secret: env:AVP_VOICE_SECRET
    metadata:
      description: "RAVEN_AVP voice-control proxy. Translates mesh envelopes into HTTPX calls to the visionOS voice-control HTTP server (100.109.10.50:5181). Runs on Mac mini."
      host: mac-mini
    surfaces:
      # Existing tool surfaces.
      - name: status
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: start_session
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: stop_session
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      # session_status — alias for status (parity with voice.py — some callers use this name).
      - name: session_status
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      # Operator hot-tuning of the avp_voice node's system prompt.
      # get_system_message returns the fully resolved instructions string
      # (built dynamically from mesh tools + scene snapshot + operator override).
      # set replaces the operator override and persists it to disk so it
      # survives restart. Takes effect on the NEXT session (in-flight sessions
      # keep their original instructions until restart).
      - name: get_system_message
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: set_system_message
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      # scene_snapshot — compact LLM-friendly summary of the current AVP scene.
      # Returns {panels: [{id, kind, text_preview, url, has_data}], count, version}.
      - name: scene_snapshot
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      # Inbox surfaces (fire_and_forget). speak=verbatim, tell=conversational.
      # Forwarded to the visionOS app via /voice/inject so the active session
      # can play them.
      - name: speak
        type: inbox
        invocation_mode: fire_and_forget
        schema: shared/schemas/permissive.json
      - name: tell
        type: inbox
        invocation_mode: fire_and_forget
        schema: shared/schemas/permissive.json

  # viewer_desktop — macOS / Electron viewer shell (runs on coltons-mac).
  # Spliced 2026-06-06. Five shared viewer surfaces; identity_secret autogenerates
  # to sha256("mesh:viewer_desktop:autogen") when env var is unset.
  - id: viewer_desktop
    kind: actor
    runtime: native
    identity_secret: env:VIEWER_DESKTOP_SECRET
    metadata:
      description: "macOS / Electron viewer shell. Hosts the five shared viewer surfaces (open_view, close_view, focus_view, list_views, notify) inside the Electron main process and translates each into renderer control actions (window open/close/focus + osascript toast). Identical surface set to viewer_spatial so an agent drives either shell the same way."
      host: coltons-mac
    surfaces:
      - name: open_view
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: close_view
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: focus_view
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: list_views
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      # Full-scene surfaces (added 2026-06-06). Where the view surfaces operate
      # only on views this node painted, these operate on the ENTIRE scene —
      # every window in every workspace regardless of who opened it (user, this
      # node, or another agent) — giving an agent full-scene visibility/control.
      - name: list_windows
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: close_window
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: focus_window
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: notify
        type: inbox
        invocation_mode: fire_and_forget
        schema: shared/schemas/permissive.json
      # Generator surfaces (added 2026-06-06). run_generator resolves a slug in
      # the shared @viewer/core registry, runs it to a View[], and opens each via
      # the same open_view seam. list_generators reflects the registry.
      - name: run_generator
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: list_generators
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json

  # viewer_spatial — visionOS / RAVEN_AVP spatial viewer shell (runs on coltons-mac).
  # Spliced 2026-06-06. Identical 8-surface set to viewer_desktop so an agent drives
  # either shell the same way. identity_secret reads VIEWER_SPATIAL_SECRET from .env;
  # autogenerates to sha256("mesh:viewer_spatial:autogen") when env var is unset.
  - id: viewer_spatial
    kind: actor
    runtime: local-process
    identity_secret: env:VIEWER_SPATIAL_SECRET
    metadata:
      description: "visionOS / RAVEN_AVP spatial viewer shell. Hosts the same eight shared viewer surfaces as viewer_desktop (open_view, close_view, focus_view, list_views, list_windows, close_window, focus_window, notify) plus generator surfaces, translating each into spatial scene operations on the headset via the scene server. Surface-identical to viewer_desktop so an agent drives either shell the same way."
      host: coltons-mac
    surfaces:
      - name: open_view
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: close_view
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: focus_view
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: list_views
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: list_windows
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: close_window
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: focus_window
        type: tool
        invocation_mode: request_response
        schema: shared/schemas/permissive.json
      - name: notify
        type: inbox
        invocation_mode: fire_and_forget
        schema: shared/schemas/permissive.json

relationships:
  # Inbound to RAVEN portal.
  - from: control
    to: raven.message
  # EDITH replies to chats by sending a new invocation to raven.message
  # (fire-and-forget reply pattern — see SPEC § inbox protocol).
  - from: edith
    to: raven.message

  # Inbound to control inbox: raven and edith can notify the control panel.
  - from: raven
    to: control.message
  - from: edith
    to: control.message

  # Inbound to EDITH chat surface.
  - from: control
    to: edith.chat
  - from: raven
    to: edith.chat

  # Core surfaces.
  - from: control
    to: core.audit_query
  - from: raven
    to: core.audit_query
  - from: raven
    to: core.state
  - from: raven
    to: core.processes
  - from: raven
    to: core.metrics
  - from: raven
    to: core.set_manifest
  - from: raven
    to: core.reload_manifest
  - from: raven
    to: core.spawn
  - from: raven
    to: core.stop
  - from: raven
    to: core.restart
  - from: raven
    to: core.reconcile
  - from: raven
    to: core.drain

  # Voice node — outbound to peer inboxes (gpt-realtime-2 model can call
  # these as Realtime function tools while a session is live).
  - from: voice
    to: raven.message
  - from: voice
    to: edith.chat
  - from: voice
    to: control.message

  # Peers can push lines into the voice surface.
  # speak = read verbatim (use for announcements: "Your 3pm meeting in 5").
  # tell  = conversational injection (model reacts/integrates naturally).
  - from: raven
    to: voice.speak
  - from: raven
    to: voice.tell
  - from: edith
    to: voice.speak
  - from: edith
    to: voice.tell
  - from: control
    to: voice.speak
  - from: control
    to: voice.tell

  # Voice tool-surface callers — Colton's dashboard + RAVEN can drive sessions.
  - from: control
    to: voice.start_session
  - from: control
    to: voice.stop_session
  - from: control
    to: voice.session_status
  - from: control
    to: voice.get_system_message
  - from: control
    to: voice.set_system_message
  - from: raven
    to: voice.start_session
  - from: raven
    to: voice.stop_session
  - from: raven
    to: voice.session_status
  - from: raven
    to: voice.get_system_message
  - from: raven
    to: voice.set_system_message
  - from: edith
    to: voice.get_system_message
  - from: edith
    to: voice.set_system_message

  # Inbound to avp: any peer can drive the scene.
  - from: raven
    to: avp.show
  - from: raven
    to: avp.add_panel
  - from: raven
    to: avp.update_panel
  - from: raven
    to: avp.remove_panel
  - from: raven
    to: avp.list_panels
  - from: raven
    to: avp.clear_scene
  - from: raven
    to: avp.add_entity
  - from: raven
    to: avp.update_entity
  - from: raven
    to: avp.remove_entity
  - from: raven
    to: avp.list_entities
  - from: raven
    to: avp.screenshot

  - from: edith
    to: avp.show
  - from: edith
    to: avp.add_panel
  - from: edith
    to: avp.update_panel
  - from: edith
    to: avp.remove_panel
  - from: edith
    to: avp.list_panels
  - from: edith
    to: avp.clear_scene
  - from: edith
    to: avp.add_entity
  - from: edith
    to: avp.update_entity
  - from: edith
    to: avp.remove_entity
  - from: edith
    to: avp.list_entities
  - from: edith
    to: avp.screenshot

  - from: voice
    to: avp.show
  - from: voice
    to: avp.add_panel
  - from: voice
    to: avp.remove_panel
  - from: voice
    to: avp.list_panels
  - from: voice
    to: avp.add_entity
  - from: voice
    to: avp.update_entity
  - from: voice
    to: avp.remove_entity
  - from: voice
    to: avp.list_entities
  - from: voice
    to: avp.screenshot

  # avp reaches back to RAVEN to notify of out-of-band scene events
  # (e.g. panel deleted by the user). Optional but useful.
  - from: avp
    to: raven.message

  # Inbound to browser.query — raven/edith/control/voice can fire tasks.
  - from: raven
    to: browser.query
  - from: edith
    to: browser.query
  - from: control
    to: browser.query
  - from: voice
    to: browser.query

  # Outbound from browser — replies to whoever sent the task.
  - from: browser
    to: raven.message
  - from: browser
    to: edith.chat
  - from: browser
    to: control.message
  - from: browser
    to: voice.tell

  # Inbound to avp_voice: raven, edith, and control can drive voice sessions.
  - from: raven
    to: avp_voice.status
  - from: raven
    to: avp_voice.start_session
  - from: raven
    to: avp_voice.stop_session

  - from: edith
    to: avp_voice.status
  - from: edith
    to: avp_voice.start_session
  - from: edith
    to: avp_voice.stop_session

  - from: control
    to: avp_voice.status
  - from: control
    to: avp_voice.start_session
  - from: control
    to: avp_voice.stop_session

  # avp_voice outbound — gpt-realtime model inside an active Vision Pro voice
  # session can call these as Realtime function tools. Discovered via
  # /v0/introspect (edges where from == avp_voice) and surfaced to the model.
  - from: avp_voice
    to: avp.list_panels
  - from: avp_voice
    to: avp.add_panel
  - from: avp_voice
    to: avp.show
  - from: avp_voice
    to: avp.remove_panel
  - from: avp_voice
    to: avp.update_panel
  - from: avp_voice
    to: avp.clear_scene
  - from: avp_voice
    to: avp.add_entity
  - from: avp_voice
    to: avp.update_entity
  - from: avp_voice
    to: avp.remove_entity
  - from: avp_voice
    to: avp.list_entities
  - from: avp_voice
    to: avp.screenshot
  - from: avp_voice
    to: raven.message
  - from: avp_voice
    to: edith.chat
  - from: avp_voice
    to: control.message
  - from: avp_voice
    to: browser.query

  # Inbound to avp_voice's new surfaces — peers can push system-message
  # overrides, query scene snapshot, and inject speak/tell into the session.
  - from: raven
    to: avp_voice.session_status
  - from: raven
    to: avp_voice.get_system_message
  - from: raven
    to: avp_voice.set_system_message
  - from: edith
    to: avp_voice.set_system_message
  - from: control
    to: avp_voice.set_system_message
  - from: raven
    to: avp_voice.scene_snapshot
  - from: edith
    to: avp_voice.scene_snapshot
  - from: raven
    to: avp_voice.speak
  - from: edith
    to: avp_voice.speak
  - from: raven
    to: avp_voice.tell
  - from: edith
    to: avp_voice.tell
  - from: control
    to: avp_voice.tell

  # raven drives the viewer_desktop shell (spliced 2026-06-06).
  - from: raven
    to: viewer_desktop.open_view
  - from: raven
    to: viewer_desktop.close_view
  - from: raven
    to: viewer_desktop.focus_view
  - from: raven
    to: viewer_desktop.list_views
  - from: raven
    to: viewer_desktop.list_windows
  - from: raven
    to: viewer_desktop.close_window
  - from: raven
    to: viewer_desktop.focus_window
  - from: raven
    to: viewer_desktop.notify
  - from: raven
    to: viewer_desktop.run_generator
  - from: raven
    to: viewer_desktop.list_generators

  # raven drives the viewer_spatial shell (spliced 2026-06-06).
  - from: raven
    to: viewer_spatial.open_view
  - from: raven
    to: viewer_spatial.close_view
  - from: raven
    to: viewer_spatial.focus_view
  - from: raven
    to: viewer_spatial.list_views
  - from: raven
    to: viewer_spatial.list_windows
  - from: raven
    to: viewer_spatial.close_window
  - from: raven
    to: viewer_spatial.focus_window
  - from: raven
    to: viewer_spatial.notify

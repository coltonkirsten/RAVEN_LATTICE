services:
  edith:
    build: .
    container_name: lattice-edith
    restart: unless-stopped
    env_file:
      - ../../hosts/mac-mini/.env
    environment:
      - EDITH_SECRET=${EDITH_SECRET:?EDITH_SECRET must be set in ../../hosts/mac-mini/.env}
      # Auth: CLAUDE_CODE_OAUTH_TOKEN preferred (NEXUS-style, Pro/Max billing).
      # ANTHROPIC_API_KEY is the fallback; one of the two must be set.
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CORE_URL=${CORE_URL:-http://host.docker.internal:8000}
      - EDITH_MODEL=${EDITH_MODEL:-claude-sonnet-4-6}
      # Mesh MCP — exposes EDITH's outbound mesh edges as tools to the
      # spawned Claude Code CLI. Reads manifest at /app/manifest.yaml.
      - EDITH_MCP_ENABLED=${EDITH_MCP_ENABLED:-1}
      - MANIFEST_PATH=/app/manifest.yaml
    volumes:
      # Read-only manifest mount so mesh_mcp.py can hot-reload edges.
      - ../../manifest.yaml:/app/manifest.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: bridge

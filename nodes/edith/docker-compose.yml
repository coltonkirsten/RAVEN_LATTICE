services:
  edith:
    build: .
    container_name: lattice-edith
    restart: unless-stopped
    env_file:
      - ../../hosts/mac-mini/.env
    environment:
      - EDITH_SECRET=${EDITH_SECRET:?EDITH_SECRET must be set in ../../hosts/mac-mini/.env}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY must be set}
      - CORE_URL=${CORE_URL:-http://host.docker.internal:8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: bridge

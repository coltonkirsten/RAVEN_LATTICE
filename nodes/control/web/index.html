<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LATTICE — Control</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  </head>
  <body>
    <header>
      <span class="logo">LATTICE</span>
      <span class="sub">control panel</span>
      <span id="status" class="status">connecting…</span>
    </header>

    <main>
      <section id="topology" class="panel">
        <h2>topology</h2>
        <div id="graph"></div>
      </section>

      <section id="audit" class="panel">
        <h2>
          audit log
          <label class="audit-filter-toggle" title="Hide control's own polling of core.audit_query">
            <input type="checkbox" id="audit-filter-polls" />
            <span>hide audit polling</span>
          </label>
          <button id="audit-refresh" type="button" class="refresh-btn" title="Refresh audit log">↻</button>
        </h2>
        <ul id="audit-list"></ul>
        <div id="audit-note" class="note"></div>
      </section>

      <section id="inbox" class="panel">
        <h2>
          <span id="inbox-title">inbox</span>
          <button id="inbox-clear" type="button" class="inbox-clear-btn" title="Clear all inbox messages">clear</button>
        </h2>
        <ul id="inbox-list"></ul>
        <div id="inbox-empty" class="note">no messages</div>
      </section>

      <section id="send" class="panel">
        <h2>send</h2>
        <form id="send-form">
          <label>
            <span>to</span>
            <select id="send-to"></select>
          </label>
          <label>
            <span>payload (JSON)</span>
            <textarea id="send-payload" rows="6" spellcheck="false">{"message":"hello"}</textarea>
          </label>
          <button type="submit">invoke</button>
        </form>
        <pre id="send-response"></pre>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
